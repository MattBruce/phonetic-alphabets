<!DOCTYPE html>

<body class="light_or_dark_here">
    <div id="modeSelector">
        <label><input type="radio" name="mode" value="standard" checked />
            Standard</label>
        <label><input type="radio" name="mode" value="hipster" />Hipster ☕</label>
        <label><input type="radio" name="mode" value="business" />Business 💼</label>
        <label><input type="radio" name="mode" value="insta" />Insta 💖</label>
        <label><input type="radio" name="mode" value="techbro" />Techbro 🚀</label>
        <label><input type="radio" name="mode" value="cursed" />Cursed 👹</label>
    </div>
    <section>
        <div id="container"></div>
        <div id="inputrow"><input id="input" type="text" placeholder="Type something...">
        </div>
        <label id="punct"><input type="checkbox"> Include punctuation</label>
        <div id="outputrow"><output id="output"></output><span id="speak">🔊</span></div>
    </section>
    <div id="toast" class="toast"></div>
</body>
